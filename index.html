<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#FFFFFF">
    <meta name="telegram-web-app" content="yes">
    <title>My Food Map</title>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />

    <link rel="stylesheet" href="style.css">

    <!-- Custom Zoom Control Styles -->
    <style>
        /* ============================================
           CUSTOM ZOOM CONTROL - Glassmorphism Design
           ============================================ */
        .custom-zoom-control {
            position: fixed;
            top: 50%;
            right: 14px;
            transform: translateY(-50%);
            margin-top: -48px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .custom-zoom-control.hidden {
            display: none !important;
        }

        /* Hide ALL default MapLibre controls */
        .maplibregl-ctrl-top-right,
        .maplibregl-ctrl-bottom-right,
        .maplibregl-ctrl-group,
        .maplibregl-ctrl-zoom-in,
        .maplibregl-ctrl-zoom-out,
        .maplibregl-ctrl-compass,
        .maplibregl-ctrl-icon {
            display: none !important;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.82);
            backdrop-filter: blur(20px) saturate(1.8);
            -webkit-backdrop-filter: blur(20px) saturate(1.8);
            border: 1px solid rgba(0, 0, 0, 0.08);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #000;
            font-size: 20px;
            font-weight: 300;
            transition: all 0.2s cubic-bezier(0.32, 0.72, 0, 1);
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .zoom-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.14);
            transform: scale(1.05);
        }

        .zoom-btn:active {
            transform: scale(0.92);
            background: rgba(255, 255, 255, 0.70);
        }

        .zoom-btn svg {
            stroke: currentColor;
            stroke-width: 2.5;
            width: 18px;
            height: 18px;
        }

        /* Hide default MapLibre controls */
        .maplibregl-ctrl-group {
            display: none !important;
        }

        /* Mobile adjustments */
        @media (max-width: 380px) {
            .custom-zoom-control {
                top: 50%;
                right: 10px;
                transform: translateY(-50%);
                margin-top: -42px;
            }
            .zoom-btn {
                width: 36px;
                height: 36px;
                border-radius: 10px;
            }
            .zoom-btn svg {
                width: 16px;
                height: 16px;
            }
        }

        /* Safe area support */
        @supports (padding-top: env(safe-area-inset-top)) {
            .custom-zoom-control {
                right: calc(14px + env(safe-area-inset-right));
            }
            .fab-location {
                right: calc(14px + env(safe-area-inset-right));
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div id="map"></div>

    <!-- Custom Zoom Controls -->
    <div class="custom-zoom-control" id="custom-zoom">
        <button class="zoom-btn" id="zoom-in" title="Zoom in" aria-label="Zoom in">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
        <button class="zoom-btn" id="zoom-out" title="Zoom out" aria-label="Zoom out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </div>

    <!-- Header -->
    <div class="header">
        <div class="header-title" id="header-title" data-i18n="app_name">My Food Map</div>
    </div>

    <!-- Search Container -->
    <div class="search-container" id="search-container">
        <div class="search-box">
            <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="search-input" placeholder="Shahar, davlat yoki joy nomi..." data-i18n-placeholder="search_placeholder" autocomplete="off">
            <button class="search-clear hidden" id="search-clear">✕</button>
        </div>
        <div id="search-autocomplete" class="search-autocomplete hidden">
            <div id="search-autocomplete-list"></div>
        </div>
    </div>

    <div class="map-picker-action">
        <button id="map-picker-btn" onclick="startMapPointPicker()" class="map-picker-btn" title="Xaritadan tanlash" aria-label="Xaritadan tanlash">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 21s-6-5.33-6-10a6 6 0 0 1 12 0c0 4.67-6 10-6 10z"></path>
                <circle cx="12" cy="11" r="2.5"></circle>
            </svg>
        </button>
    </div>

    <!-- Warning (admin only) -->
    <div id="no-coords-warning" class="no-coords-warning hidden">
        <span data-i18n="no_coords_warning">⚠️ Places without coordinates!</span>
        <button onclick="showPlacesList()" class="warning-btn" data-i18n="view">View</button>
    </div>

    <!-- Route Panel -->
    <div id="route-panel" class="route-panel hidden">
        <div class="rp-drag" id="rp-drag-handle"></div>
        <div class="rp-header">
            <span class="rp-title" data-i18n="route">Route</span>
            <div style="display:flex;align-items:center;gap:6px;">
                <button class="rp-toggle" aria-label="Toggle">
                    <svg class="rp-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <button class="rp-close" onclick="event.stopPropagation(); closeRoute()" aria-label="Close">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>
        <div class="rp-locations">
            <div class="rp-row">
                <div class="rp-dot rp-dot-from" aria-hidden="true"></div>
                <div class="rp-field">
                    <label class="rp-label" data-i18n="from_loc">From</label>
                    <div class="rp-value" id="rp-from-text">—</div>
                    <input type="hidden" id="route-from" data-lat="" data-lng="">
                </div>
                <button class="rp-loc-btn" onclick="setFromCurrent()" title="My location">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                    </svg>
                </button>
            </div>
            <div class="rp-connector">
                <div class="rp-line"></div>
                <button class="rp-swap" onclick="swapRoute()" title="Swap">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M7 16V4M7 4L3 8M7 4l4 4M17 8v12m0-12l4 4m-4-4l-4 4"/>
                    </svg>
                </button>
            </div>
            <div class="rp-row">
                <div class="rp-dot rp-dot-to" aria-hidden="true"></div>
                <div class="rp-field">
                    <label class="rp-label" data-i18n="to_loc">To</label>
                    <div class="rp-value" id="rp-to-text">—</div>
                    <input type="hidden" id="route-to" data-lat="" data-lng="">
                </div>
            </div>
        </div>
        <div id="route-info" class="rp-info hidden">
            <div class="rp-info-chip">
                <span class="rp-info-icon">🛣</span>
                <span id="route-dist" class="rp-info-val">0 km</span>
            </div>
            <div class="rp-info-sep"></div>
            <div class="rp-info-chip">
                <span class="rp-info-icon">⏱</span>
                <span id="route-time" class="rp-info-val">0 min</span>
            </div>
        </div>
        <button id="rp-build-btn" onclick="calculateRoute()" class="rp-action" data-i18n="build_route">Build Route</button>
    </div>

    <!-- FAB Location -->
    <button onclick="locateUser()" class="fab-location" title="My location">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
        </svg>
    </button>

    <!-- ===== PLACE CARD (Compact + Expandable) ===== -->
    <div id="place-card" class="place-card hidden">
        <!-- Drag handle - ENG YUQORIDA -->
        <div class="card-drag-handle" id="card-drag-handle" onclick="togglePlaceCard()"></div>
        
        <!-- Compact view: Name + expand button -->
        <div class="card-header-compact">
            <div class="card-title-section">
                <h3 id="card-name">Place Name</h3>
                <span id="card-category" class="category-badge">Food</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
                <button onclick="togglePlaceCard()" class="card-expand-btn" id="card-expand-btn" aria-label="Expand">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
                <button onclick="closeCard()" class="card-close-btn" aria-label="Close">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Expanded view: Full text description -->
        <div id="card-description" class="card-description-text hidden"></div>

        <!-- Action buttons (always visible) -->
        <div class="card-actions">
            <button onclick="startRouteToPlace()" class="action-btn directions">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
                </svg>
                <span data-i18n="directions">Yo'nalish</span>
            </button>
            <button onclick="openInMaps()" class="action-btn maps">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <polygon points="1 6 1 22 8 18 16 22 21 18 21 6 16 10 8 6 1 10"></polygon>
                </svg>
                <span data-i18n="open_map">Xaritada</span>
            </button>
            <button onclick="callPlace()" class="action-btn call">
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                </svg>
                <span data-i18n="call">Qo'ng'iroq</span>
            </button>
        </div>
    </div>

    <!-- Admin Panel -->
    <div id="admin-panel" class="admin-panel hidden">
        <h3 data-i18n="admin_panel">Admin</h3>
        <button onclick="showAddForm()" class="admin-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
            <span data-i18n="add_place">Joy qo'shish</span>
        </button>
        <button onclick="geocodeAllPlaces()" class="admin-btn orange">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/>
            </svg>
            <span data-i18n="coordinates">Koordinatalar</span>
        </button>
        <button onclick="showPlacesList()" class="admin-btn blue">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line>
                <line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line>
            </svg>
            <span data-i18n="list">Ro'yxat</span>
        </button>
    </div>

    <!-- Add Place Modal -->
    <div id="add-form" class="modal hidden">
        <div class="modal-content">
            <h3 data-i18n="add_place">Joy qo'shish</h3>
            <input type="text" id="new-name" data-i18n-placeholder="name_placeholder" placeholder="Nomi *">
            <input type="text" id="new-address" data-i18n-placeholder="address_placeholder" placeholder="Manzil">
            <input type="number" step="any" id="new-lat" data-i18n-placeholder="lat_placeholder" placeholder="Kenglik">
            <input type="number" step="any" id="new-lng" data-i18n-placeholder="lng_placeholder" placeholder="Uzunlik">
            <textarea id="new-details" data-i18n-placeholder="details_placeholder" placeholder="Tafsilotlar" rows="4"></textarea>
            <div class="map-picker-hint" data-i18n="map_pick_hint">Xaritada joy tanlang</div>
            <div class="modal-actions">
                <button onclick="closeAddForm()" class="btn-secondary" data-i18n="cancel">Bekor</button>
                <button onclick="savePlace()" class="btn-primary" data-i18n="save">Saqlash</button>
            </div>
        </div>
    </div>

    <!-- Places List Modal -->
    <div id="places-list-modal" class="modal hidden">
        <div class="modal-content list-content">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                <h3 data-i18n="all_restaurants" style="margin-bottom:0;">Barcha restoranlar</h3>
                <button onclick="closePlacesList()" class="close-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div id="places-list-content" style="max-height:65vh;overflow-y:auto;"></div>
        </div>
    </div>

    <!-- Profile Page -->
    <div id="profile-page" class="profile-wrapper">
        <div class="profile-banner">
            <div class="profile-avatar-wrap">
                <img id="profile-avatar" src="" alt="" class="profile-avatar-img hidden" onerror="this.classList.add('hidden'); document.getElementById('profile-avatar-fb').classList.remove('hidden');">
                <div id="profile-avatar-fb" class="profile-avatar-fallback hidden">U</div>
            </div>
        </div>
        <div class="profile-info">
            <h2 id="profile-name">User</h2>
            <p class="username" id="profile-username">@username</p>
        </div>
        <div class="profile-cards">
            <button onclick="locateUser()" class="profile-location-btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/>
                </svg>
                <span data-i18n="my_location">Mening joylashuvim</span>
            </button>
            <div class="profile-card language-selector-card">
                <span class="profile-card-label" data-i18n="select_language">Tilni tanlang</span>
                <div class="language-options">
                    <button class="lang-option" data-lang="uz" onclick="changeLanguage('uz')">
                        <span class="lang-flag">🇺🇿</span>
                        <span class="lang-name">O'zbekcha</span>
                        <span class="lang-check" id="check-uz">✓</span>
                    </button>
                    <button class="lang-option" data-lang="ru" onclick="changeLanguage('ru')">
                        <span class="lang-flag">🇷🇺</span>
                        <span class="lang-name">Русский</span>
                        <span class="lang-check" id="check-ru">✓</span>
                    </button>
                    <button class="lang-option" data-lang="en" onclick="changeLanguage('en')">
                        <span class="lang-flag">🇬🇧</span>
                        <span class="lang-name">English</span>
                        <span class="lang-check" id="check-en">✓</span>
                    </button>
                </div>
            </div>
            <div class="profile-card">
                <span class="profile-card-label">Telegram ID</span>
                <div class="profile-card-value">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    <span id="profile-id">—</span>
                </div>
            </div>
            <div class="profile-card">
                <span class="profile-card-label" data-i18n="current_language">Joriy til</span>
                <div class="profile-card-value">
                    <span class="lang-flag" id="profile-lang-flag">🌐</span>
                    <span id="profile-lang">UZ</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <button class="nav-btn active" onclick="showTab('map', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <polygon points="1 6 1 22 8 18 16 22 21 18 21 6 16 10 8 6 1 10"></polygon>
            </svg>
            <span data-i18n="map">Xarita</span>
        </button>
        <button class="nav-btn" onclick="showTab('profile', this)">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <span data-i18n="profile">Profil</span>
        </button>
    </div>

    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="app.js"></script>
</body>
</html>
